        "200":
          description: Successful response with Beneficiary list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: false
                  totalCount:
                    type: string
                    example: "10320"
                  message:
                    type: array
                    items:
                      type: object
                      properties:
                        mainWallet:
                          type: string
                          example: "1198916900"
                        beneficiaryName:
                          type: string
                          example: "Solomon waleligh"
                        mobile:
                          type: string
                          example: "251961201230"
                        mainWalletBalance:
                          type: string
                          example: "600.00"
                        subWallets:
                          type: array
                          items:
                            type: object
                            properties:
                              walletName:
                                type: string
                                example: "Oil"
                              walletBalance:
                                type: string
                                example: "100.00"
                              cycle:
                                type: string
                                example: "Test Cycle-2"
                          example:
                            - walletName: "Oil"
                              walletBalance: "100.00"
                              cycle: "Test Cycle-2"
                            - walletName: "Eggs"
                              walletBalance: "100.00"
                              cycle: "Test Cycle-2"
                            - walletName: "Vegetables"
                              walletBalance: "100.00"
                              cycle: "Test Cycle-2"
                            - walletName: "Cereal"
                              walletBalance: "100.00"
                              cycle: "Test Cycle-2"
                            - walletName: "Pulses"
                              walletBalance: "100.00"
                              cycle: "Test Cycle-2"
                            - walletName: "Salt"
                              walletBalance: "100.00"
                              cycle: "Test Cycle-2"
        "400":
          description: Bad request. The provided data is invalid or missing required fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "No content passed."
        "500":
          description: Internal server error. An unexpected error occurred on the server.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: true
                  message:
