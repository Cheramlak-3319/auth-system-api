  /wfp/getcashouttotals.php:
    get:
      tags:
        - WFP
      summary: Fetch Cashouts
      description: Retrieves cashout transactions with optional filters
      x-roles:
        - wfp_admin
        - wfp_viewer
      parameters:
        - name: voucher
          in: query
          description: Voucher code or ID
          required: false
          schema:
            type: string
        - name: offset
          in: query
          description: Pagination offset
          required: false
          schema:
            type: integer
            default: 0
        - name: dateFrom
          in: query
          description: Start date filter (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          description: End date filter (YYYY-MM-DD)
          required: false
          schema:
            type: string
            format: date
        - name: limit
          in: query
          description: Number of records per page
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Cashout totals retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: false
                  message:
                    type: object
                    properties:
                      totalCashoutAmount:
                        type: string
                        example: "200,291,934.04"
                      totalCashoutNumber:
                        type: string
                        example: "143700"
                      totalCashoutFeeAmount:
                        type: string
                        example: "92010.93919999992"
                      totalCashoutFeeNumber:
                        type: string
                        example: "143700"
        "400":
          description: Bad request. The provided data is invalid or missing required fields.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "No content passed."
        "500":
          description: Internal server error. An unexpected error occurred on the server.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "An internal server error occurred."

